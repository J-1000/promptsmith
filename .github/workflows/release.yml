name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { runner: macos-13, goos: darwin, goarch: amd64 }
          - { runner: macos-latest, goos: darwin, goarch: arm64 }
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: cli/go.sum

      # go-sqlite3 requires cgo, so each target is compiled natively on its own
      # runner rather than cross-compiled.
      - name: Build
        env:
          CGO_ENABLED: '1'
        run: |
          go build -trimpath \
            -ldflags "-s -w -X github.com/promptsmith/cli/cmd.version=${GITHUB_REF_NAME}" \
            -o promptsmith .

      - name: Package
        run: |
          archive="promptsmith_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$archive" promptsmith ../README.md ../LICENSE
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptsmith-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            cli/promptsmith_*.tar.gz
            cli/promptsmith_*.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
